# Recommended topology: this config is for the system/bot mailbox that the runner logs into.
# Human users should keep using their own mailbox client/account and send mail to the bot mailbox.
imap_host: imap.example.com
imap_port: 993
imap_user: your_imap_user
imap_password: your_imap_password
smtp_host: smtp.example.com
smtp_port: 465
smtp_user: your_smtp_user
smtp_password: your_smtp_password
poll_seconds: 30
task_root: tasks
default_timeout_minutes: 60
# Optional first-mail freshness guard for non-reply [OC]/[CX] task ingress.
# 0 disables the guard. A positive value only accepts new-task mail whose Date
# header is within that many minutes of current runner time.
new_task_max_age_minutes: 0
max_active_sessions: 4
# Optional same-workspace active working-set cap. Defaults to `max_active_sessions` when omitted.
max_active_sessions_per_workspace: 4
max_running_sessions: 4
max_running_sessions_per_workspace: 2
auto_create_workdir: false
enable_web_search: false
spawn_active_session_windows: false
active_session_window_refresh_seconds: 5
active_session_window_buffer_lines: 1000
active_session_window_history_limit: 12
mock_sleep_seconds: 1.0
project_sync_roots:
  - D:\projects
  - E:\projects
# Empty means auto-discover the CLI. Use "demo" for local adapter dry runs.
opencode_command: ""
codex_command: ""
opencode_transport_default: sdk
codex_transport_default: sdk
# Empty means using the bundled sidecar at scripts/codex_sdk_sidecar/dist/index.js.
codex_sdk_sidecar_command: ""
codex_sdk_sidecar_workdir: ""
# Optional profile-to-model mappings. Keys are high-level profile names used in mail/snapshots.
opencode_profile_models:
  fast: openai/gpt-5-mini
  strong: openai/gpt-5
codex_profile_models:
  fast: gpt-5-mini
  strong: gpt-5-codex
# Outbound delivery transport.
# `email` keeps the current direct-PC behavior.
# `relay` pushes one outbound packet to the VPS relay and lets the VPS send the user-facing mail.
outbound_transport: email
relay_url: ""
relay_transport_token: ""
relay_client_id: pc-local
relay_client_version: 0.1.0-dev
relay_timeout_seconds: 15
relay_verify_tls: true
relay_ca_file: ""
relay_auto_fallback_email: false
from_name: Mail Runner
from_addr: runner@example.com
# Optional legacy COS delivery outside the relay /v1/files owner lane.
# Keep real credentials in a local-only file such as mail_config.cos.local.yaml.
cos_region: ""
cos_bucket: ""
cos_secret_id: ""
cos_secret_key: ""
cos_object_prefix: mail-runner
external_delivery_threshold_mb: 20
# In the current relay owner lane, attachable artifacts already go through /v1/files
# regardless of size. This threshold only applies outside that relay path.
cos_presign_expire_seconds: 604800
